# ==============================================================================
#  RCIA - Nginx Location Blocks
#  Add inside the existing `server {}` block in your Nginx config
#  (e.g. /etc/nginx/sites-available/konasal)
#
#  After adding, run:  sudo nginx -t && sudo systemctl reload nginx
# ==============================================================================

# RCIA exact match for docs UI
location = /rcia/docs {
    proxy_pass http://127.0.0.1:RCIA_PORT/docs;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# RCIA OpenAPI schema (required for /docs to render)
location = /rcia/openapi.json {
    proxy_pass http://127.0.0.1:RCIA_PORT/openapi.json;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# RCIA API routes
location /rcia/api/v1/ {
    proxy_pass http://127.0.0.1:RCIA_PORT/api/v1/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
}

# RCIA general routes (catch-all, must come LAST)
location /rcia/ {
    proxy_pass http://127.0.0.1:RCIA_PORT/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
}
